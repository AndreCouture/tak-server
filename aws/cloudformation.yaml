AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OpenTAKServer — Minimal cost deployment for testing TAK Can.
  OTS (official Docker stack) + MediaMTX (video) on a single t3.small.
  ~$17/mo running, ~$2/mo stopped (EBS + EIP).
  Stop/start: aws ec2 stop-instances / start-instances

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair for EC2 access

  AllowedIP:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR for SSH + management access (set to your IP/32 for security)

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone ID for takaware.ca

  DomainName:
    Type: String
    Default: tak.takaware.ca
    Description: Subdomain for TAK server

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for the EC2 instance

Resources:

  # --- Security Group ---
  TakServerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: TAK Server ports
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIP
          Description: SSH
        # Let's Encrypt HTTP challenge + redirect
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP - Lets Encrypt challenge
        # HTTPS Web UI
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS Web UI
        # Data Package / HTTP API (proxied by nginx)
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: HTTP API (nginx proxy)
        # CoT
        - IpProtocol: tcp
          FromPort: 8088
          ToPort: 8088
          CidrIp: 0.0.0.0/0
          Description: CoT TCP (unencrypted)
        - IpProtocol: tcp
          FromPort: 8089
          ToPort: 8089
          CidrIp: 0.0.0.0/0
          Description: CoT TLS
        - IpProtocol: udp
          FromPort: 6969
          ToPort: 6969
          CidrIp: 0.0.0.0/0
          Description: CoT UDP multicast
        # Marti / OTS API
        - IpProtocol: tcp
          FromPort: 8443
          ToPort: 8443
          CidrIp: 0.0.0.0/0
          Description: HTTPS API (nginx proxy)
        - IpProtocol: tcp
          FromPort: 8446
          ToPort: 8446
          CidrIp: 0.0.0.0/0
          Description: CSR HTTPS (client cert enrollment)
        # MQTT / Meshtastic
        - IpProtocol: tcp
          FromPort: 8883
          ToPort: 8883
          CidrIp: 0.0.0.0/0
          Description: MQTTS (Meshtastic)
        # Video
        - IpProtocol: tcp
          FromPort: 1935
          ToPort: 1935
          CidrIp: 0.0.0.0/0
          Description: RTMP video ingest
        - IpProtocol: tcp
          FromPort: 8554
          ToPort: 8554
          CidrIp: 0.0.0.0/0
          Description: RTSP video playback
        - IpProtocol: tcp
          FromPort: 8888
          ToPort: 8888
          CidrIp: 0.0.0.0/0
          Description: HLS video playback
        - IpProtocol: tcp
          FromPort: 8889
          ToPort: 8889
          CidrIp: 0.0.0.0/0
          Description: WebRTC video
        # MediaMTX admin API — restricted to AllowedIP
        - IpProtocol: tcp
          FromPort: 9997
          ToPort: 9997
          CidrIp: !Ref AllowedIP
          Description: MediaMTX admin API (admin only)

  # --- Secrets Manager — OTS admin credentials ---
  TakAdminSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/tak-admin"
      Description: OTS administrator credentials (password rotated on first boot)
      SecretString: '{"username":"administrator","password":"placeholder"}'

  # --- IAM Role (SSM + Route53 for certbot DNS-01 challenge + Secrets Manager) ---
  TakServerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: CertbotRoute53
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - route53:ListHostedZones
                  - route53:GetChange
                Resource: '*'
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                Resource: !Sub "arn:aws:route53:::hostedzone/${HostedZoneId}"
        - PolicyName: TakAdminSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:PutSecretValue
                  - secretsmanager:GetSecretValue
                Resource: !Ref TakAdminSecret

  TakServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref TakServerRole]

  # --- Elastic IP ---
  TakServerEIP:
    Type: AWS::EC2::EIP

  TakServerEIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref TakServer
      AllocationId: !GetAtt TakServerEIP.AllocationId

  # --- DNS Record ---
  TakServerDNS:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      TTL: 300
      ResourceRecords:
        - !Ref TakServerEIP

  # --- EC2 Instance ---
  # NOTE: Using t3.small (x86_64, 2GB RAM) — OTS runs PostgreSQL + RabbitMQ +
  # multiple Python services + nginx which requires ~1.5GB RAM minimum.
  # OTS does not publish ARM64 images so t4g (Graviton) will fail.
  TakServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref TakServerInstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds: [!Ref TakServerSG]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
      Tags:
        - Key: Name
          Value: tak-server
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          # Install Docker + tools
          dnf update -y
          dnf install -y docker git qrencode cronie python3-pip augeas-libs jq
          systemctl enable docker && systemctl start docker
          systemctl enable crond && systemctl start crond
          usermod -aG docker ec2-user

          # Docker Compose v2 + buildx plugins (OTS requires buildx 0.17.0+)
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -sL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          # Compatibility shim for legacy 'docker-compose' calls
          ln -sf /usr/local/lib/docker/cli-plugins/docker-compose /usr/local/bin/docker-compose

          # Install latest buildx (AL2023 bundles an older version that OTS rejects)
          BUILDX_VER=$(curl -s https://api.github.com/repos/docker/buildx/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sL "https://github.com/docker/buildx/releases/download/${BUILDX_VER}/buildx-${BUILDX_VER}.linux-amd64" \
            -o /usr/local/lib/docker/cli-plugins/docker-buildx
          chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

          # Install certbot with Route53 DNS plugin for browser-trusted TLS on port 443.
          # DNS-01 challenge — no web server needed, uses IAM role for Route53 auth.
          pip3 install certbot certbot-dns-route53

          # Clone OpenTAKServer Docker repo (contains nginx/rabbitmq/mediamtx configs)
          git clone https://github.com/brian7704/OpenTAKServer-Docker.git /opt/tak-server
          cd /opt/tak-server

          # --- Let's Encrypt cert (before OTS starts so nginx builds with correct config) ---
          DOMAIN="${DomainName}"
          certbot certonly \
            --dns-route53 \
            --non-interactive \
            --agree-tos \
            --email admin@takaware.ca \
            -d "$DOMAIN"

          # Patch nginx port-443 template to use LE cert (browser trusted).
          # Ports 8443/8446 keep the OTS self-signed cert + OTS CA for TAK mutual TLS.
          sed -i 's|include includes.d/opentakserver_certificate;|include includes.d/letsencrypt_certificate;|' \
            ots/configs/nginx/templates/https-443.conf.template

          # Create the LE nginx include (baked into nginx image at build time)
          cat > ots/configs/nginx/includes/letsencrypt_certificate << NGINXEOF
          ssl_certificate     /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
          NGINXEOF

          # Mount host /etc/letsencrypt into nginx-proxy container.
          # Also fix ots-webui container name: nginx upstream expects "opentakserver-webui"
          # but the upstream compose uses "ots-webui".
          cat > docker-compose.override.yml << 'OVERRIDEEOF'
          services:
            nginx-proxy:
              volumes:
                - /etc/letsencrypt:/etc/letsencrypt:ro
              depends_on:
                ots-webui:
                  condition: service_started
            ots-webui:
              container_name: opentakserver-webui
              restart: unless-stopped
          OVERRIDEEOF

          # AL2023 uses /etc/localtime, not /etc/timezone — remove the rabbitmq volume mount
          sed -i '/\/etc\/timezone/d' docker-compose.yml

          # Pre-create data dirs with correct ownership for each container user:
          #   ots container runs as ots (UID 1000 / GID 1024) — owns top-level ./ots
          #   postgres container runs as postgres (UID 999) — owns ./ots/pgdata
          mkdir -p ots/pgdata
          chown 1000:1024 ots
          chown 999:999 ots/pgdata

          # Generate secrets and write OTS config.
          # OTS_FQDN is the public address advertised to TAK clients and used in TLS certs.
          DB_PASSWORD=$(openssl rand -hex 16)
          cat > ots_config.env << ENVEOF
          SQLALCHEMY_DATABASE_URI=postgresql+psycopg://ots:$DB_PASSWORD@ots-db/ots
          OTS_FQDN=${DomainName}
          OTS_RABBITMQ_SERVER_ADDRESS=rabbitmq
          OTS_LISTENER_ADDRESS=0.0.0.0
          OTS_MEDIAMTX_API_ADDRESS=http://mediamtx:9997
          POSTGRES_PASSWORD=$DB_PASSWORD
          POSTGRES_USER=ots
          POSTGRES_DB=ots
          PGUSER=ots
          ENVEOF
          chmod 600 ots_config.env

          # Install and configure CloudWatch agent
          dnf install -y amazon-cloudwatch-agent
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'CWEOF'
          {
            "agent": { "metrics_collection_interval": 60, "run_as_user": "root" },
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/messages",
                      "log_group_name": "/tak-server/system",
                      "log_stream_name": "{instance_id}/messages",
                      "timezone": "UTC"
                    },
                    {
                      "file_path": "/var/lib/docker/containers/**/*-json.log",
                      "log_group_name": "/tak-server/docker",
                      "log_stream_name": "{instance_id}/{hostname}",
                      "timezone": "UTC",
                      "multi_line_start_pattern": "^\\{"
                    }
                  ]
                }
              }
            },
            "metrics": {
              "namespace": "TAKServer",
              "metrics_collected": {
                "cpu":  { "measurement": ["cpu_usage_active"], "metrics_collection_interval": 60 },
                "mem":  { "measurement": ["mem_used_percent"],  "metrics_collection_interval": 60 },
                "disk": { "measurement": ["disk_used_percent"], "resources": ["/"], "metrics_collection_interval": 60 }
              }
            }
          }
          CWEOF
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 -s \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json

          # Start OTS stack.
          # First run builds the ots and nginx-proxy images (~5-10 mins).
          docker compose up -d

          # Certbot renewal cron — host certbot renews, then reloads nginx (daily 03:00)
          cat > /etc/cron.d/certbot-renew << 'CRONEOF'
          0 3 * * * root certbot renew --quiet --post-hook "docker compose -f /opt/tak-server/docker-compose.yml exec nginx-proxy nginx -s reload"
          CRONEOF

          # Systemd service for auto-start on reboot
          cat > /etc/systemd/system/tak-server.service << 'SVC'
          [Unit]
          Description=TAK Server (OpenTAKServer)
          After=docker.service
          Requires=docker.service
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory=/opt/tak-server
          ExecStart=/usr/local/bin/docker-compose up -d
          ExecStop=/usr/local/bin/docker-compose down
          [Install]
          WantedBy=multi-user.target
          SVC
          systemctl enable tak-server

          # Bootstrap TLS (port 8089) + generate QR codes once OTS is healthy
          OUT=/opt/tak-server/clients
          mkdir -p $OUT
          (
            cd /opt/tak-server
            DOMAIN="${DomainName}"
            FLASK="/app/venv/bin/flask --app /app/venv/lib/python3.13/site-packages/opentakserver/app.py"

            # Wait up to 10 minutes for OTS API to respond
            for i in $(seq 1 60); do
              curl -sk "https://localhost:8443/api/health" >/dev/null 2>&1 && break
              sleep 10
            done

            # Ensure CA + server cert exist in the shared volume.
            # OTS creates them on startup, but ots_eud_handler_ssl may have started
            # before they were written. Running these is idempotent (no-op if exists).
            docker exec opentakserver $FLASK ots create-ca || true
            docker exec opentakserver $FLASK ots issue-server-certificate || true

            # Restart SSL handler so it picks up certs cleanly (no more crash-loop)
            docker compose restart ots_eud_handler_ssl

            # Rotate default administrator password (default is 'password' — insecure)
            ADMIN_PASS=$(openssl rand -hex 16)
            TOKEN=$(curl -sk -X POST "https://localhost:8443/oauth/token" \
              -d "username=administrator&password=password" | jq -r '.access_token')
            curl -sk -X POST "https://localhost:8443/api/user/password/reset" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"administrator\",\"new_password\":\"$ADMIN_PASS\"}" >/dev/null
            aws secretsmanager put-secret-value \
              --secret-id "${TakAdminSecret}" \
              --secret-string "{\"username\":\"administrator\",\"password\":\"$ADMIN_PASS\"}" \
              --region "${AWS::Region}"
            # Local fallback — readable by root only
            printf 'administrator:%s\n' "$ADMIN_PASS" > /opt/tak-server/admin-credentials.txt
            chmod 600 /opt/tak-server/admin-credentials.txt

            # iTAK / TAK Can QR format: name,host,port,protocol
            CONFIG="TAK Can,$DOMAIN,8089,ssl"

            for callsign in ALPHA-1 BRAVO-1 CHARLIE-1 DELTA-1 ECHO-1; do
              slug=$(echo "$callsign" | tr '[:upper:]' '[:lower:]')
              printf '%s' "$CONFIG" > "$OUT/config-$slug.txt"
              qrencode -o "$OUT/qr-$slug.png" -s 8 -l H "$CONFIG"
            done

            printf '%s' "$CONFIG" > "$OUT/server-config.txt"
            qrencode -o "$OUT/server-qr.png" -s 8 -l H "$CONFIG"
          ) &

  # --- CloudWatch Log Groups ---
  TakServerSystemLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /tak-server/system
      RetentionInDays: 14

  TakServerDockerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /tak-server/docker
      RetentionInDays: 14

  # --- Auto-Stop Lambda (stop after 2h of no traffic) ---
  AutoStopRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EC2StopDescribe
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:StopInstances
                  - cloudwatch:GetMetricStatistics
                Resource: '*'

  AutoStopFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: tak-server-auto-stop
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt AutoStopRole.Arn
      Timeout: 30
      Environment:
        Variables:
          INSTANCE_ID: !Ref TakServer
      Code:
        ZipFile: |
          import boto3, os, datetime

          def handler(event, context):
              ec2 = boto3.client('ec2')
              cw  = boto3.client('cloudwatch')
              iid = os.environ['INSTANCE_ID']

              r = ec2.describe_instances(InstanceIds=[iid])
              state = r['Reservations'][0]['Instances'][0]['State']['Name']
              if state != 'running':
                  return {'status': 'already stopped'}

              end   = datetime.datetime.utcnow()
              start = end - datetime.timedelta(hours=2)
              m = cw.get_metric_statistics(
                  Namespace='AWS/EC2', MetricName='NetworkIn',
                  Dimensions=[{'Name': 'InstanceId', 'Value': iid}],
                  StartTime=start, EndTime=end,
                  Period=7200, Statistics=['Sum']
              )
              # < 1 MB in 2h = no real TAK connections
              total = sum(d['Sum'] for d in m['Datapoints'])
              if total < 1_000_000:
                  ec2.stop_instances(InstanceIds=[iid])
                  return {'status': 'stopped', 'network_bytes': total}
              return {'status': 'active', 'network_bytes': total}

  AutoStopSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: Check TAK server activity every 2 hours
      ScheduleExpression: rate(2 hours)
      Targets:
        - Arn: !GetAtt AutoStopFunction.Arn
          Id: AutoStopTarget

  AutoStopPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AutoStopFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AutoStopSchedule.Arn

# --- AMI Map (AL2023 x86_64) ---
Mappings:
  RegionAMI:
    ca-central-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-east-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-west-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Outputs:
  ServerIP:
    Value: !Ref TakServerEIP
    Description: TAK Server public IP

  ServerDomain:
    Value: !Ref DomainName
    Description: TAK Server domain name

  InstanceId:
    Value: !Ref TakServer
    Description: Instance ID for stop/start

  CoTTCP:
    Value: !Sub "${DomainName}:8088"
    Description: CoT TCP endpoint (unencrypted)

  CoTTLS:
    Value: !Sub "${DomainName}:8089"
    Description: CoT TLS endpoint

  AdminSecretArn:
    Value: !Ref TakAdminSecret
    Description: Secrets Manager ARN for OTS admin credentials

  WebUI:
    Value: !Sub "https://${DomainName}"
    Description: OTS Web Admin UI — credentials in Secrets Manager (see AdminSecretArn output)

  MediaMTXAdmin:
    Value: !Sub "http://${DomainName}:9997"
    Description: MediaMTX admin API (restricted to AllowedIP)

  API:
    Value: !Sub "https://${DomainName}:8443"
    Description: OTS HTTPS API

  CSRAPI:
    Value: !Sub "https://${DomainName}:8446"
    Description: CSR endpoint for client cert enrollment

  RTMPIngest:
    Value: !Sub "rtmp://${DomainName}:1935/live"
    Description: RTMP video push URL

  RTSPPlayback:
    Value: !Sub "rtsp://${DomainName}:8554/live"
    Description: RTSP video playback URL

  StopServer:
    Value: !Sub "aws ec2 stop-instances --instance-ids ${TakServer} --region ${AWS::Region}"
    Description: Stop server to save costs (~$2/mo stopped)

  StartServer:
    Value: !Sub "aws ec2 start-instances --instance-ids ${TakServer} --region ${AWS::Region}"
    Description: Start server
